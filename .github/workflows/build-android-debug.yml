name: Build Android — Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'artifacts/people-mobile/**'
      - '.github/workflows/build-android-debug.yml'

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: meta
        working-directory: artifacts/people-mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building debug v$VERSION (code $VERSION_CODE)"

      - name: Expo Prebuild — Android
        working-directory: artifacts/people-mobile
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: artifacts/people-mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/people-mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Collect & rename debug APK
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist/debug
          APK=$(find artifacts/people-mobile/android -name "*.apk" -path "*/debug/*" | head -1)
          [ -n "$APK" ] && cp "$APK" "dist/debug/PeopleMemory-v${VERSION}-debug.apk"
          ls -lh dist/debug/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-debug-apk
          path: dist/debug/*.apk
          retention-days: 14
