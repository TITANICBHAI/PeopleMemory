name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'artifacts/people-mobile/**'
      - '.github/workflows/build-android-debug.yml'

jobs:
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: meta
        working-directory: artifacts/people-mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building People Memory debug v$VERSION (versionCode $VERSION_CODE)"

      - name: Expo Prebuild (Android)
        working-directory: artifacts/people-mobile
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Point Android SDK at pre-installed SDK
        working-directory: artifacts/people-mobile/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/people-mobile/android/**/*.gradle*', 'artifacts/people-mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: artifacts/people-mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/people-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect and rename Debug APK
        run: |
          V="${{ steps.meta.outputs.version }}"
          mkdir -p dist
          APK=$(find artifacts/people-mobile/android -name "*.apk" -path "*/debug/*" | head -1)
          [ -n "$APK" ] && cp "$APK" "dist/PeopleMemory-v${V}-debug.apk" && echo "APK: dist/PeopleMemory-v${V}-debug.apk"
          ls -lh dist/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-debug-apk
          path: dist/PeopleMemory-v${{ steps.meta.outputs.version }}-debug.apk
          retention-days: 14
