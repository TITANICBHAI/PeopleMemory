name: Build Android — Release (APK + AAB)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/people-mobile/**'
      - '.github/workflows/build-android-release.yml'

jobs:
  build-release:
    name: Release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: meta
        working-directory: artifacts/people-mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building v$VERSION (code $VERSION_CODE)"

      - name: Expo Prebuild — Android
        working-directory: artifacts/people-mobile
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/people-mobile/android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Inject signing config into gradle.properties
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/people-mobile/android
        run: |
          cat >> gradle.properties << 'EOF'
          RELEASE_STORE_FILE=release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          EOF

      - name: Inject signingConfigs block into build.gradle
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/people-mobile/android/app
        run: |
          python3 - << 'PYEOF'
          import re, pathlib
          text = pathlib.Path('build.gradle').read_text()
          signing_config = """
              signingConfigs {
                  release {
                      storeFile file(RELEASE_STORE_FILE)
                      storePassword RELEASE_STORE_PASSWORD
                      keyAlias RELEASE_KEY_ALIAS
                      keyPassword RELEASE_KEY_PASSWORD
                  }
              }
          """
          text = re.sub(r'(android\s*\{)', r'\1' + signing_config, text, count=1)
          text = re.sub(r'(release\s*\{)', r'\1\n            signingConfig signingConfigs.release', text, count=1)
          pathlib.Path('build.gradle').write_text(text)
          print("Signing config injected.")
          PYEOF

      - name: Make gradlew executable
        working-directory: artifacts/people-mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/people-mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Release AAB
        working-directory: artifacts/people-mobile/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Collect & rename release artifacts
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist/release
          APK=$(find artifacts/people-mobile/android -name "*.apk" ! -path "*/debug/*" | head -1)
          AAB=$(find artifacts/people-mobile/android -name "*.aab" | head -1)
          [ -n "$APK" ] && cp "$APK" "dist/release/PeopleMemory-v${VERSION}-release.apk"
          [ -n "$AAB" ] && cp "$AAB" "dist/release/PeopleMemory-v${VERSION}-release.aab"
          ls -lh dist/release/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-release-apk
          path: dist/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-release-aab
          path: dist/release/*.aab
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: People Memory v${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/release/PeopleMemory-v${{ steps.meta.outputs.version }}-release.apk
            dist/release/PeopleMemory-v${{ steps.meta.outputs.version }}-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
