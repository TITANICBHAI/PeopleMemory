name: Build Android Release (APK + AAB)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/people-mobile/**'
      - '.github/workflows/build-android-release.yml'

jobs:
  build-release:
    name: Release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: meta
        working-directory: artifacts/people-mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building People Memory v$VERSION (versionCode $VERSION_CODE)"

      - name: Expo Prebuild (Android)
        working-directory: artifacts/people-mobile
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Point Android SDK at pre-installed SDK
        working-directory: artifacts/people-mobile/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode keystore (if secret is set)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/people-mobile/android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Inject release signing into build.gradle (keystore)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/people-mobile/android/app
        run: |
          node -e "
          const fs = require('fs');
          let g = fs.readFileSync('build.gradle', 'utf8');
          const sigCfg = \`
              signingConfigs {
                  release {
                      storeFile file('release.keystore')
                      storePassword '${{ secrets.STORE_PASSWORD }}'
                      keyAlias '${{ secrets.KEY_ALIAS }}'
                      keyPassword '${{ secrets.KEY_PASSWORD }}'
                  }
              }
          \`;
          g = g.replace(/android\s*\{/, 'android {' + sigCfg);
          g = g.replace(/buildTypes\s*\{[\s\S]*?release\s*\{/, (m) => m + '\n            signingConfig signingConfigs.release');
          fs.writeFileSync('build.gradle', g);
          console.log('Release signing injected from keystore secret.');
          "

      - name: Use debug signing for release build (no keystore secret set)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: artifacts/people-mobile/android/app
        run: |
          node -e "
          const fs = require('fs');
          let g = fs.readFileSync('build.gradle', 'utf8');
          g = g.replace(/release\s*\{/, 'release {\n            signingConfig signingConfigs.debug');
          fs.writeFileSync('build.gradle', g);
          console.log('Debug signing applied to release build (no keystore secret set).');
          "

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/people-mobile/android/**/*.gradle*', 'artifacts/people-mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: artifacts/people-mobile/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/people-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        working-directory: artifacts/people-mobile/android
        run: ./gradlew bundleRelease --no-daemon

      - name: Collect and rename artifacts
        run: |
          V="${{ steps.meta.outputs.version }}"
          mkdir -p dist
          APK=$(find artifacts/people-mobile/android -name "*.apk" ! -path "*/debug/*" | head -1)
          AAB=$(find artifacts/people-mobile/android -name "*.aab" | head -1)
          [ -n "$APK" ] && cp "$APK" "dist/PeopleMemory-v${V}-release.apk" && echo "APK: dist/PeopleMemory-v${V}-release.apk"
          [ -n "$AAB" ] && cp "$AAB" "dist/PeopleMemory-v${V}-release.aab" && echo "AAB: dist/PeopleMemory-v${V}-release.aab"
          ls -lh dist/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-release-apk
          path: dist/PeopleMemory-v${{ steps.meta.outputs.version }}-release.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: PeopleMemory-v${{ steps.meta.outputs.version }}-release-aab
          path: dist/PeopleMemory-v${{ steps.meta.outputs.version }}-release.aab
          retention-days: 30
